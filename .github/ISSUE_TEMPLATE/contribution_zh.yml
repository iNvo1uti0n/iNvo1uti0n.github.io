name: 贡献问题模板
about: 用于提交站点内容、页面修复或翻译改进建议。
title: "[贡献]"
labels: contribution
body:
  - type: markdown
    attributes:
      value: "# 请使用下面的表单提交贡献建议，帮助我（们）更快定位问题并改进网站内容。"
  - type: dropdown
    id: issue-type
    attributes:
      label: 贡献类型
      description: 请选择此次贡献的类型。
      options:
        - 🐛 Bug 修复
        - 📝 翻译更新
        - 🛠️ 代码重构/优化
        - 🎨 视觉/样式优化
        - 💡 新功能建议
        - 📌 其他
      default: [0]
      multiple: true
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: 语言/版本
      description: 请选择受影响的语言分支。
      options:
        - 🌐 全站
        - 🇨🇳 中文 (/zh/)
        - 🇺🇸 英文 (/en/)
      default: 0
  - type: textarea
    id: summary
    attributes:
      label: 简要说明
      description: 用一句话说明你希望改进或修复的内容。
      placeholder: 例如："修复首页跳转链接，避免 404 页面"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 详细描述
      description: 请提供更详细的说明、复现步骤或改进建议。
      placeholder: |
        例如：
        1. 访问页面：/zh/index.html
        2. 当前行为：链接指向错误 404 地址
        3. 期望行为：链接应跳转到正确页面
  - type: textarea
    id: expected_result
    attributes:
      label: 期望结果
      description: 请描述最终希望呈现的效果。
      placeholder: 例如："页面应正常跳转到首页并显示中文内容"
  - type: input
    id: reference_link
    attributes:
      label: 参考链接 / 截图
      description: 如果有相关 issue、参考资料或截图链接，请填写此项。
      placeholder: 例如：`https://...` 或 `https://imgur.com/...`
  - type: textarea
    id: note
    attributes:
      label: 备注
      description: 可选：其他补充信息，例如来源、设备、浏览器等。
      placeholder: 例如："在 Microsoft Edge 146.0.2035.88 中复现"

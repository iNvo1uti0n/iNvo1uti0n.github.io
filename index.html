<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <title>iNvo1uti0n's blog</title>
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <style>
            .no-select{user-select:none;}
            .glow{text-shadow:0 0 2px #99FF33;}
            .glow:hover{animation: pulse 1 ease-in-out infinite alternate;}
            @keyframes pulse{
                from{text-shadow: 0 0 2px #99FF33;}
                to{text-shadow: 0 0 4px #99FF33;}
            }
            a:link h1{text-decoration:none;}
            a:hover h1{text-decoration:underline;}
            h1{
                display: inline-block;
                font-family:'Courier New', monospace;
                color:#99FF33;
            }
            hr{
                border:0.5px dashed #99FF33;
                margin-left:2.5cm;
                margin-right:2.5cm;
            }
            p{font-family:'Courier New', monospace;}
        </style>
    </head>
    <body style="background-color:#151515;">

        <div id="title" style="display:inline-flex;align-items:flex-end;text-align:left;margin-left:0.9cm;">
            <h1 class="no-select" id="title-prefix" style="margin:0;padding-top:0.6em;padding-right:0.67em;">./</h1>
            <a href="https://iNvo1uti0n.github.io" style="color:#99ff33;">
                <h1 id="title-main" style="margin:0">iNvo1uti0n</h1>
            </a>
        </div>
        <p id="intro" style="text-align:left;margin-left:2.5cm;color:#999999;">Welcome to iNvo1uti0n's blog!</p>
        <br class="no-select" />
        <!--
        <button type="button" onclick="alert('Hello, World!')" class="no-select" style="margin-left:2.5cm;">Click Me</button>
        <br class="no-select" />
        -->
        <hr />
        <br class="no-select" />
        <p style="text-align:left;margin-left:2.5cm;color:#999999;">There's nothing here yet ...</p>
        <script>
            const charSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,/\\|?!@#$%^&*[]{}<>\'\"~`+=- ';
            const titlePrefix = document.getElementById('title-prefix');
            const titleMain = document.getElementById('title-main');
            const intro = document.getElementById('intro');

            function randomChar(){return charSet[Math.floor(Math.random() * charSet.length)];}
            function createGarbled(text){return Array.from(text, ch => ch === ' ' ? ' ' : randomChar()).join('');}
            function animateText(element, text){
                const target = String(text);
                let display = createGarbled(target).split('');
                let index = 0;
                element.textContent = display.join('');

                const timer = setInterval(() => {
                    if(index >= target.length){
                        clearInterval(timer);
                        element.textContent = target;
                        return;
                    }
                    if(target[index] === ' '){
                        display[index] = ' ';
                        index += 1;
                        return;
                    }
                    display[index] = target[index];
                    for(let i = index + 1;i < target.length;i += 1)
                        if(target[i] !== ' ') display[i] = randomChar();
                    element.textContent = display.join('');
                    index += 1;
                },50);
            }
            
            window.addEventListener('load',() => {
                titlePrefix.textContent = './';
                titleMain.textContent = createGarbled('iNvo1uti0n');
                intro.textContent = createGarbled("Welcome to iNvo1uti0n's blog!");
                setTimeout(() => {
                    animateText(titleMain, 'iNvo1uti0n');
                    animateText(intro, "Welcome to iNvo1uti0n's blog!");
                },120);
            });
        </script>

    </body>
</html>

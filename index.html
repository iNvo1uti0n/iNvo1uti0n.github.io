<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <title>跳转中...</title>
        <link rel="icon" type="image/png" href="/favicon.png">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <script>
            window.location.replace("/zh/");
        </script>
        <style>
            .no-select{user-select:none;}
            .normal-text{
                text-align:left;
                margin-left:2.5cm;
                color:#CCCCCC;
                font-family:'Courier New', monospace;
            }
            .loading-icon{
                margin-right:0.4rem;
                color:#CCCCCC;
                vertical-align:text-bottom;
            }
            a:link h1{text-decoration:none;}
            a:hover h1{text-decoration:underline;}
            h1{
                display:inline-block;
                font-family:'Courier New', monospace;
                color:#99FF33;
            }
            hr{
                border:none;
                height:2px;
                margin-left:2.5cm;
                margin-right:2.5cm;
                background-image:linear-gradient(to right,#99FF33 60%,rgba(0,0,0,0) 0%);
                background-size:14.5px 1.5px;
                background-repeat:repeat-x;
            }
            p{font-family:'Courier New', monospace;}
        </style>
    </head>
    <body style="background-color:#151515;">

        <div id="title" style="display:inline-flex;align-items:flex-end;text-align:left;margin-top:0.6cm;margin-left:0.9cm;">
            <h1 class="no-select" id="title-prefix" style="margin:0;">./</h1>
            <h1 class="no-select" style="padding-right:0.58cm;"></h1>
            <a href="https://iNvo1uti0n.github.io" style="color:#99ff33;">
                <h1 id="title-main" style="margin:0">iNvo1uti0n</h1>
            </a>
        </div>
        <p id="intro" class="normal-text">
            <i id="loading-icon" class="fa-solid fa-spinner fa-spin loading-icon" aria-hidden="true"></i>
            <span id="intro-text">跳转中 ...</span>
        </p>
        <script>
            const charSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,/\\|?!@#$%^&*[]{}<>\'\"~`+=-';
            const titlePrefix = document.getElementById('title-prefix');
            const titleMain = document.getElementById('title-main');
            const introText = document.getElementById('intro-text');

            function randomChar(){return charSet[Math.floor(Math.random() * charSet.length)];}
            function createGarbled(text){return Array.from(text, ch => ch === ' ' ? ' ' : randomChar()).join('');}
            function animateText(element, text){
                const target = String(text);
                let display = createGarbled(target).split('');
                let index = 0;
                element.textContent = display.join('');

                const timer = setInterval(() => {
                    if(index >= target.length){
                        clearInterval(timer);
                        element.textContent = target;
                        return;
                    }
                    if(target[index] === ' '){
                        display[index] = ' ';
                        index += 1;
                        return;
                    }
                    display[index] = target[index];
                    for(let i = index + 1;i < target.length;i += 1)
                        if(target[i] !== ' ') display[i] = randomChar();
                    element.textContent = display.join('');
                    index += 1;
                },50);
            }
            
            window.addEventListener('load',() => {
                titlePrefix.textContent = './';
                titleMain.textContent = createGarbled('iNvo1uti0n');
                introText.textContent = createGarbled("跳转中 ...");
                setTimeout(() => {
                    animateText(titleMain, 'iNvo1uti0n');
                    animateText(introText, "跳转中 ...");
                },120);
            });
            
        </script>

    </body>
</html>

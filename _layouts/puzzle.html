<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <title>{{ page.title }}</title>
        <link rel="icon" type="image/png" href="/favicon.png">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <script>
        if(window.location.pathname === '/index.html') window.location.replace('/');
        </script>
        <style>
            a:link h1{text-decoration:none;}
            a:hover h1{text-decoration:underline;}
            h1, h2, h3{
                margin-top: 1.4cm;
                text-align: center;
                font-family:'Courier New', monospace;
                color:#9F3;
            }
            hr{
                border:none;
                height:2px;
                margin-left:2.5cm;
                margin-right:2.5cm;
                background-image:linear-gradient(to right,#9F3 60%,rgba(0,0,0,0) 0%);
                background-size:14.5px 1.5px;
                background-repeat:repeat-x;
            }
            button{font-family:'Courier New', monospace;font-size: 1em;}
            p{
                text-align: center;
                font-family:'Courier New', monospace;
                color:#CCC;
            }
            br{
                user-select: none;
            }
        </style>
    </head>
    <body style="background-color:#151515;">

        {{ content }}

    </body>
</html>

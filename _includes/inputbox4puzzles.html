<style>
    .val-group {
        display: inline-flex;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: none;
    }
    .val-group input {
        font-family: 'Courier New', monospace;
        font-size: 1rem;
        padding: 0.7rem 1.2rem;
        border: 1px solid #CCC;
        background: #FFF;
        box-shadow: inset 0 1px 1px rgba(0,0,0,0.07);
        outline: none;
        border-radius: 12px 0 0 12px;
        border-right-width: 0;
    }
    .val-group input:focus {
        border-color: #9F3;
    }
    .val-group button {
        font-family: 'Courier New', monospace;
        font-size: 1rem;
        font-weight: 600;
        padding: 0.7rem 1.5rem;
        color: #FFF;
        background: #9F3;
        border: 1px solid #CCC;
        box-shadow: inset 0 1px 1px rgba(0,0,0,0.07);
        border-radius: 0 12px 12px 0;
        cursor: pointer;
        transition: background 0.2;
    }
    .val-group button:hover {
        background: #6C3;
    }
</style>

{% assign id = include.id | default: "validator" %}
{% assign placeholder = include.placeholder | default: "Enter answer" %}
{% assign pattern_raw = include.pattern %}
{% assign redirect_url = include.redirect %}
{% assign oops_url = "/puzzle/oops/" %}

<div class="val-group">
    <input type="text" id="inp-{{ id }}" placeholder="{{ placeholder }}">
    <button type="button">Submit</button>
</div>

<script>
(function(){
    var inp = document.getElementById('inp-{{ id }}');
    var btn = inp.nextElementSibling;
    var patternRaw = {{ pattern_raw | jsonify }};
    var redirectUrl = {{ redirect_url | jsonify }};
    var oopsUrl = {{ oops_url | jsonify }};
    var expected = typeof patternRaw === 'string' ? patternRaw.toLowerCase() : patternRaw;
    
    function check(){
        var val = inp.value.trim();
        if (!val) {
            location.href = oopsUrl;
            return;
        }
        if (val.toLowerCase() === expected) {
            location.href = redirectUrl;
        } else {
            location.href = oopsUrl;
        }
    }
    
    btn.onclick = check;
    inp.onkeypress = function(e){ if(e.key === 'Enter') check(); };
})();
</script>

<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <title>iNvo1uti0n's blog</title>
        <link rel="icon" type="image/png" href="/favicon.png">
        <link id="giscus-css" rel="stylesheet" href="https://giscus.app/default.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <script>
        if(window.location.pathname === '/zh.html') window.location.replace('/zh/');
        </script>
        <style>
            .no-select{user-select:none;}
            .no-underline{text-decoration:none;color:#CCC;}
            .no-underline:hover{text-decoration:none;animation: change-color 0.3s ease-in-out;}
            @keyframes change-color{
                from{color:#CCC;}
                to{color:#9F3;}
            }
            .normal-text{
                text-align:left;
                margin-left:2.5cm;
                color:#CCC;
                font-family:'Courier New', monospace;
            }
            .text-button{
                all:unset;
                font-family:'Courier New', monospace;
                cursor:pointer;
                display:inline-block;
            }
            .text-button:hover h1{text-decoration:underline;}
            .glow{text-shadow:0 0 2px #9F3;}
            .glow:hover{animation: pulse 1s ease-in-out infinite alternate;}
            @keyframes pulse{
                from{text-shadow: 0 0 2px #9F3;}
                to{text-shadow: 0 0 4px #9F3;}
            }
            a:link h1{text-decoration:none;}
            a:hover h1{text-decoration:underline;}
            h1{
                display:inline-block;
                font-family:'Courier New', monospace;
                color:#9F3;
            }
            hr{
                border:none;
                height:2px;
                margin-left:2.5cm;
                margin-right:2.5cm;
                background-image:linear-gradient(to right,#9F3 60%,rgba(0,0,0,0) 0%);
                background-size:14.5px 1.5px;
                background-repeat:repeat-x;
            }
            #sidebar hr{
                margin:0.5rem 0;
                width:100%;
                background-image:linear-gradient(to right,#9F3 60%,rgba(0,0,0,0) 0%);
                background-size:14.5px 1.5px;
                background-repeat:repeat-x;
            }
            #sidebar{
                position:fixed;
                top:0;
                left:0;
                height:100vh;
                width:280px;
                transform:translateX(-100%);
                transition:transform 0.25s ease;
                background:#1a1a1a;
                box-shadow:2px 0 12px rgba(0,0,0,0.7);
                display:flex;
                flex-direction:column;
                justify-content:space-between;
                z-index:20;
            }
            #sidebar.open{transform:translateX(0);}
            #sidebar .sidebar-content{padding:1cm 1cm 0.5cm 1.1cm; color:#CCC; font-family:'Courier New', monospace;}
            #sidebar .sidebar-header{display:flex;align-items:flex-end;gap:0.6cm;margin-bottom:0.8em;}
            #sidebar .sidebar-header .text-button{all:unset;cursor:pointer;display:inline-flex;align-items:flex-end;}
            #sidebar .sidebar-header h1{margin:0;font-family:'Courier New', monospace;color:#9F3;}
            #home-page,#about-me,#change-language{display:inline-flex;align-items:center;gap:0.35cm; color:#CCC; transition:color 0.2s ease;}
            #home-page i,
            #home-page p,
            #about-me i,
            #about-me p,
            #change-language i,
            #change-language p{display:inline-block;margin:0;color:inherit;}
            #home-page:hover,
            #about-me:hover,
            #change-language:hover{color:#9F3;}
            #sidebar .sidebar-bottom{height:48px; background:#333333;}
            button{font-family:'Courier New', monospace;font-size: 1em;}
            p{font-family:'Courier New', monospace;}
            #sidebar .sidebar-content br.no-select{display:block;margin:0.5rem 0;line-height:0;}
        </style>
        <script>
            const translations = {
                zh: {
                    'nothing': "这里什么都没有 ...",
                    'intro': "我是 iNvo1uti0n",
                    'sidebar': "侧边栏",
                    'home': "主页",
                    'about': "关于我",
                    'change-language': "切换语言"
                },
                en: {
                    'nothing': "There's nothing here ...",
                    'intro': "I'm iNvo1uti0n",
                    'sidebar': "Sidebar",
                    'home': "Home",
                    'about': "About Me",
                    'change-language': "Change Language"
                },
                ja: {
                    'nothing': "ここには何もありません ...",
                    'intro': "私は iNvo1uti0n です",
                    'sidebar': "サイドバー",
                    'home': "ホーム",
                    'about': "私について",
                    'change-language': "言語を変更"
                }
            };
        </script>
    </head>
    <body style="background-color:#151515;">

        <div id="sidebar" aria-hidden="true">
            <div class="sidebar-content">
                <div class="sidebar-header">
                    <button id="sidebar-toggle" type="button" class="no-select text-button" aria-expanded="true">
                        <h1 class="no-select" id="sidebar-prefix" style="margin:0;">./</h1>
                    </button>
                    <h1 data-translate="sidebar" style="margin:0;font-size:2em;color:#9F3;">侧边栏</h1>
                </div>
                <br /><br />
                <a class="no-underline" href="/zh/" style="color:#CCC">
                    <div id="home-page">
                        <i class="fa-solid fa-house"></i>
                        <p data-translate="home" style="font-size:1.2em;">主页</p>
                    </div>
                </a>
                <br class="no-select" /><br class="no-select" />
                <a class="no-underline" href="/zh/about/" style="color:#CCC">
                    <div id="about-me">
                        <i class="fa-solid fa-user"></i>
                        <p data-translate="about" style="font-size:1.2em;">关于我</p>
                    </div>
                </a>
                <br class="no-select" /><br class="no-select" />
                <div class="no-underline" id="change-language-container" style="color:#CCC;position:relative;cursor:pointer;">
                    <div id="change-language" style="display:inline-flex;align-items:center;gap:0.35cm;">
                        <i class="fa-solid fa-language"></i>
                        <p data-translate="change-language" style="font-size:1.1em;">切换语言</p>
                        <p class="no-select" style="margin-left:0.5cm;margin-right:0.5cm;"></p>
                        <i id="chevron-icon" class="fa-solid fa-chevron-right" style="transition:transform 0.2s;"></i>
                    </div>
                    <div id="language-dropdown" style="display:none;position:static;margin-left:2.2em;margin-top:0.2em;background:none;border-radius:0;padding:0;box-shadow:none;min-width:0;">
                        <div class="dropdown-item" href="javascript:void(0);" data-lang="zh" id="zh-lang" style="padding:0.2em 0 0.2em 0;color:#CCC;cursor:pointer;background:none;opacity:0;transform:translateY(-10px);transition:opacity 0.25s,transform 0.25s;transition-delay:0s;">中文</div>
                        <div class="dropdown-item" href="javascript:void(0);" data-lang="en" id="en-lang" style="padding:0.2em 0 0.2em 0;color:#CCC;cursor:pointer;background:none;opacity:0;transform:translateY(-10px);transition:opacity 0.25s,transform 0.25s;transition-delay:0s;">English</div>
                        <div class="dropdown-item" href="javascript:void(0);" data-lang="ja" id="ja-lang" style="padding:0.2em 0 0.2em 0;color:#CCC;cursor:pointer;background:none;opacity:0;transform:translateY(-10px);transition:opacity 0.25s,transform 0.25s;transition-delay:0s;">日本語</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-bottom"></div>
        </div>

        <div id="title" style="display:inline-flex;align-items:flex-end;text-align:left;margin-top:0.6cm;margin-left:0.9cm;">
            <button id="menu" type="button" class="no-select text-button" aria-expanded="false">
                <h1 class="no-select" id="title-prefix" style="margin:0;">./</h1>
            </button>
            <h1 class="no-select" style="padding-right:0.58cm;"></h1>
            <h1 id="title-main" style="margin:0">关于我</h1>
        </div>
        <p id="intro" class="normal-text">我是 iNvo1uti0n</p>
        <br class="no-select" />
        <hr />
        <br class="no-select" />
        <p class="normal-text" data-translate="nothing">这里什么都没有 ...</p>
        
        <script>

            // 语言切换下拉菜单功能
            (function(){
                const langBtn = document.getElementById('change-language-container');
                const chevron = document.getElementById('chevron-icon');
                const dropdown = document.getElementById('language-dropdown');
                let open = false;
                langBtn.addEventListener('click', function(e){
                    e.stopPropagation();
                    open = !open;
                    dropdown.style.display = open ? 'block' : 'none';
                    chevron.style.transform = open ? 'rotate(90deg)' : 'rotate(0deg)';
                    const items = dropdown.querySelectorAll('.dropdown-item');
                    if(open){
                        setTimeout(()=>{
                            items.forEach((item,i)=>{
                                item.style.transitionDelay = (i*0.08)+"s";
                                item.style.opacity = '1';
                                item.style.transform = 'translateY(0)';
                            });
                        },10);
                    }else{
                        items.forEach((item,i)=>{
                            item.style.transitionDelay = ((items.length-1-i)*0.08)+"s";
                            item.style.opacity = '0';
                            item.style.transform = 'translateY(-10px)';
                        });
                    }
                });
                document.addEventListener('click', function(){
                    if(open){
                        open = false;
                        const items = dropdown.querySelectorAll('.dropdown-item');
                        items.forEach((item,i)=>{
                            item.style.opacity = '0';
                            item.style.transform = 'translateY(-10px)';
                        });
                        setTimeout(()=>{
                            dropdown.style.display = 'none';
                        },250);
                        chevron.style.transform = 'rotate(0deg)';
                    }
                });
                dropdown.addEventListener('click', function(e){
                    e.stopPropagation();
                    const lang = e.target.getAttribute('data-lang');
                    if(lang){
                        localStorage.setItem('site-lang', lang);
                        location.reload();
                    }
                });
            })();

            // 多语言切换功能
            function setLang(lang) {
                if(!translations[lang]) return;
                document.documentElement.lang = lang;
                document.querySelectorAll('[data-translate]').forEach(function(el){
                    const key = el.getAttribute('data-translate');
                    if(translations[lang][key]) el.textContent = translations[lang][key];
                });
                // 下拉菜单选项始终为“中文”“English”“日本語”
                if(document.getElementById('zh-lang')) document.getElementById('zh-lang').textContent = '中文';
                if(document.getElementById('en-lang')) document.getElementById('en-lang').textContent = 'English';
                if(document.getElementById('ja-lang')) document.getElementById('ja-lang').textContent = '日本語';
            }

            const charSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,/\\|?!@#$%^&*[]{}<>\'\"~`+=-';
            const titlePrefix = document.getElementById('title-prefix');
            const titleMain = document.getElementById('title-main');
            const intro = document.getElementById('intro');

            function randomChar(){return charSet[Math.floor(Math.random() * charSet.length)];}
            function createGarbled(text){return Array.from(text, ch => ch === ' ' ? ' ' : randomChar()).join('');}
            function animateText(element, text){
                const target = String(text);
                let display = createGarbled(target).split('');
                let index = 0;
                element.textContent = display.join('');

                const timer = setInterval(() => {
                    if(index >= target.length){
                        clearInterval(timer);
                        element.textContent = target;
                        return;
                    }
                    if(target[index] === ' '){
                        display[index] = ' ';
                        index += 1;
                        return;
                    }
                    display[index] = target[index];
                    for(let i = index + 1;i < target.length;i += 1)
                        if(target[i] !== ' ') display[i] = randomChar();
                    element.textContent = display.join('');
                    index += 1;
                },50);
            }

            window.addEventListener('load',() => {
                // 语言切换
                let lang = localStorage.getItem('site-lang') || 'zh';
                setLang(lang);

                titlePrefix.textContent = './';
                titleMain.textContent = createGarbled(translations[lang]['about']);
                intro.textContent = createGarbled(translations[lang]['intro']);
                setTimeout(() => {
                    animateText(titleMain, translations[lang]['about']);
                    animateText(intro, translations[lang]['intro']);
                },120);
            });

            const menuButton = document.getElementById('menu');
            const sidebarButton = document.getElementById('sidebar-toggle');
            const sidebarPrefix = document.getElementById('sidebar-prefix');
            const prefixAnimationTimer = { timer: null };
            const sidebarPrefixAnimationTimer = { timer: null };

            function restorePrefixText(element, text, timerHolder) {
                const target = String(text);
                let display = element.textContent.split('');
                if (display.length !== target.length) display = Array.from(target, () => ' ');
                let index = 0;

                if (timerHolder.timer) clearInterval(timerHolder.timer);
                timerHolder.timer = setInterval(() => {
                    if (index >= target.length) {
                        clearInterval(timerHolder.timer);
                        timerHolder.timer = null;
                        element.textContent = target;
                        return;
                    }
                    display[index] = target[index];
                    element.textContent = display.join('');
                    index += 1;
                }, 80);
            }

            function flashPrefixGarbledText(element, timerHolder) {
                const original = './';
                let garbleCount = 0;
                const maxGarbleSteps = 5;

                if (timerHolder.timer) {
                    clearInterval(timerHolder.timer);
                    timerHolder.timer = null;
                }

                timerHolder.timer = setInterval(() => {
                    element.textContent = createGarbled(original);
                    garbleCount += 1;
                    if (garbleCount >= maxGarbleSteps) {
                        clearInterval(timerHolder.timer);
                        timerHolder.timer = null;
                        restorePrefixText(element, original, timerHolder);
                    }
                }, 70);
            }

            if (menuButton) menuButton.addEventListener('mouseenter', () => flashPrefixGarbledText(titlePrefix, prefixAnimationTimer));
            if (sidebarButton) sidebarButton.addEventListener('mouseenter', () => flashPrefixGarbledText(sidebarPrefix, sidebarPrefixAnimationTimer));

            const sidebar = document.getElementById('sidebar');

            function setSidebarOpen(isOpen) {
                sidebar.classList.toggle('open', isOpen);
                sidebar.setAttribute('aria-hidden', String(!isOpen));
                if (menuButton) menuButton.setAttribute('aria-expanded', String(isOpen));
                if (sidebarButton) sidebarButton.setAttribute('aria-expanded', String(isOpen));
            }

            if (menuButton && sidebar) {
                menuButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const isOpen = !sidebar.classList.contains('open');
                    setSidebarOpen(isOpen);
                });

                if (sidebarButton) {
                    sidebarButton.addEventListener('click', (event) => {
                        event.stopPropagation();
                        setSidebarOpen(false);
                    });
                }

                document.addEventListener('click', (event) => {
                    if (!sidebar.classList.contains('open')) return;
                    if (sidebar.contains(event.target) || menuButton.contains(event.target) || (sidebarButton && sidebarButton.contains(event.target))) return;
                    setSidebarOpen(false);
                });
            }
        </script>

    </body>
</html>

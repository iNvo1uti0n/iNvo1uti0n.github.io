<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <title>404 Not Found</title>
        <link rel="icon" type="image/png" href="/favicon.png">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="/style.css">
    </head>
    <body style="background-color:#151515;">

        <div id="sidebar" aria-hidden="true">
            <div class="sidebar-content">
                <div class="sidebar-header">
                    <button id="sidebar-toggle" type="button" class="no-select text-button" aria-expanded="true">
                        <h1 class="no-select" id="sidebar-prefix" style="margin:0;">./</h1>
                    </button>
                    <h1 data-translate="sidebar" style="margin:0;font-size:2em;color:#99FF33;">侧边栏</h1>
                </div>
                <br class="no-select"/><br class="no-select"/>
                <a class="no-underline" href="/" style="color:#CCCCCC">
                    <div id="home-page">
                        <i class="fa-solid fa-house"></i>
                        <p data-translate="home" style="font-size:1.1em;">主页</p>
                    </div>
                </a>
                <br class="no-select" /><br class="no-select" />
                <a class="no-underline" href="/about/" style="color:#CCCCCC;">
                    <div id="about-me" style="display:inline-flex;align-items:center;gap:0.35cm;color:inherit;transition:color 0.2s ease;">
                        <i class="fa-solid fa-user" style="display:inline-block;margin:0;color:inherit;"></i>
                        <p data-translate="about" style="display:inline-block;margin:0;color:inherit;font-size:1.1em;">关于我</p>
                    </div>
                </a>
                <br class="no-select" /><br class="no-select" />
                <div class="no-underline" id="change-language-container" style="color:#CCCCCC;position:relative;cursor:pointer;">
                    <div id="change-language" style="display:inline-flex;align-items:center;gap:0.35cm;">
                        <i class="fa-solid fa-language"></i>
                        <p data-translate="change-language" style="font-size:1.1em;">切换语言</p>
                        <p class="no-select" style="margin-left:0.5cm;margin-right:0.5cm;"></p>
                        <i id="chevron-icon" class="fa-solid fa-chevron-right" style="transition:transform 0.2s;"></i>
                    </div>
                    <div id="language-dropdown" style="display:none;position:static;margin-left:2.2em;margin-top:0.2em;background:none;border-radius:0;padding:0;box-shadow:none;min-width:0;">
                        <button type="button" class="dropdown-item" data-lang="zh" id="zh-lang" style="padding:0.2em 0 0.2em 0;color:#CCCCCC;cursor:pointer;background:none;opacity:0;transform:translateY(-10px);transition:opacity 0.25s,transform 0.25s;transition-delay:0s;border:none;width:100%;text-align:left;">中文</button>
                        <button type="button" class="dropdown-item" data-lang="en" id="en-lang" style="padding:0.2em 0 0.2em 0;color:#CCCCCC;cursor:pointer;background:none;opacity:0;transform:translateY(-10px);transition:opacity 0.25s,transform 0.25s;transition-delay:0s;border:none;width:100%;text-align:left;">English</button>
                        <button type="button" class="dropdown-item" data-lang="ja" id="ja-lang" style="padding:0.2em 0 0.2em 0;color:#CCCCCC;cursor:pointer;background:none;opacity:0;transform:translateY(-10px);transition:opacity 0.25s,transform 0.25s;transition-delay:0s;border:none;width:100%;text-align:left;">日本語</button>
                    </div>
                </div>
            </div>
            <div class="sidebar-bottom"></div>
        </div>

        <div id="title" style="display:inline-flex;align-items:flex-end;text-align:left;margin-top:0.6cm;margin-left:0.9cm;">
            <button id="menu" type="button" class="no-select text-button" aria-expanded="false">
                <h1 class="no-select" id="title-prefix" style="margin:0;">./</h1>
            </button>
            <h1 class="no-select" style="padding-right:0.58cm;"></h1>
            <h1 id="title-main" style="margin:0"></h1>
        </div>
        <br class="no-select" /><br class="no-select" />
        <p class="normal-text">
            <span id="text1"></span>
            <span id="countdown"></span>
            <span id="text2"></span>
        </p>
        <p class="normal-text">
            <span id="text3"></span>
            <a class="no-underline" id="stop-countdown" href="#" onclick="stopRedirect(); return false;" style="text-decoration:none;"></a>
        </p>
        <p class="normal-text"><span id="text4"></span></p>
        <p class="normal-text">
            <span id="text5"></span>
            <a class="no-underline" id="go-home" href="/" style="text-decoration:none;"></a>
        </p>
        <p class="normal-text">
            <span id="text6"></span>
            <a class="no-underline" id="go-last-page" href="javascript:history.back()" style="text-decoration:none;"></a>
        </p>
        <script>
            // 多语言翻译内容
            const translations = {
                zh: {
                    'sidebar': "侧边栏",
                    'home': "主页",
                    'about': "关于我",
                    'change-language': "切换语言"
                },
                en: {
                    'sidebar': "Sidebar",
                    'home': "Home",
                    'about': "About Me",
                    'change-language': "Change Language"
                },
                ja: {
                    'sidebar': "サイドバー",
                    'home': "ホーム",
                    'about': "私について",
                    'change-language': "言語を変更"
                }
            };

            const path = window.location.pathname;
            const charSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,/\\|?!@#$%^&*[]{}<>\'\"~`+=-';
            const titlePrefix = document.getElementById('title-prefix');
            const titleMain = document.getElementById('title-main');
            const text1 = document.getElementById('text1');
            const countdown = document.getElementById('countdown');
            const text2 = document.getElementById('text2');
            const text3 = document.getElementById('text3');
            const stopCountdown = document.getElementById('stop-countdown');
            const text4 = document.getElementById('text4');
            const text5 = document.getElementById('text5');
            const goHome = document.getElementById('go-home');
            const text6 = document.getElementById('text6');
            const goLastPage = document.getElementById('go-last-page');
            const menuButton = document.getElementById('menu');
            const sidebarButton = document.getElementById('sidebar-toggle');
            const sidebarPrefix = document.getElementById('sidebar-prefix');
            const sidebar = document.getElementById('sidebar');
            const prefixAnimationTimer = { timer: null };
            const sidebarPrefixAnimationTimer = { timer: null };

            // 语言切换下拉菜单功能
            (function(){
                const langBtn = document.getElementById('change-language-container');
                const chevron = document.getElementById('chevron-icon');
                const dropdown = document.getElementById('language-dropdown');
                let open = false;
                langBtn.addEventListener('click', function(e){
                    e.stopPropagation();
                    open = !open;
                    dropdown.style.display = open ? 'block' : 'none';
                    chevron.style.transform = open ? 'rotate(90deg)' : 'rotate(0deg)';
                    const items = dropdown.querySelectorAll('.dropdown-item');
                    if(open){
                        setTimeout(()=>{
                            items.forEach((item,i)=>{
                                item.style.transitionDelay = (i*0.08)+"s";
                                item.style.opacity = '1';
                                item.style.transform = 'translateY(0)';
                            });
                        },10);
                    }else{
                        items.forEach((item,i)=>{
                            item.style.transitionDelay = ((items.length-1-i)*0.08)+"s";
                            item.style.opacity = '0';
                            item.style.transform = 'translateY(-10px)';
                        });
                    }
                });
                document.addEventListener('click', function(){
                    if(open){
                        open = false;
                        const items = dropdown.querySelectorAll('.dropdown-item');
                        items.forEach((item,i)=>{
                            item.style.opacity = '0';
                            item.style.transform = 'translateY(-10px)';
                        });
                        setTimeout(()=>{
                            dropdown.style.display = 'none';
                        },250);
                        chevron.style.transform = 'rotate(0deg)';
                    }
                });
                dropdown.addEventListener('click', function(e){
                    e.stopPropagation();
                    const lang = e.target.getAttribute('data-lang');
                    if(lang){
                        localStorage.setItem('site-lang', lang);
                        location.reload();
                    }
                });
            })();

            // 多语言切换功能
            function setLang(lang) {
                if(!translations[lang]) return;
                document.documentElement.lang = lang;
                document.querySelectorAll('[data-translate]').forEach(function(el){
                    const key = el.getAttribute('data-translate');
                    if(translations[lang][key]) el.textContent = translations[lang][key];
                });
                // 下拉菜单选项始终为“中文”“English”“日本語”
                if(document.getElementById('zh-lang')) document.getElementById('zh-lang').textContent = '中文';
                if(document.getElementById('en-lang')) document.getElementById('en-lang').textContent = 'English';
                if(document.getElementById('ja-lang')) document.getElementById('ja-lang').textContent = '日本語';
            }

            // 404页面倒计时和内容
            const redirectDelay = 5;
            let remainingSeconds = redirectDelay;

            function updateCountdownText(){
                countdown.textContent = remainingSeconds;
                if(localStorage.getItem('site-lang') === 'en'){
                    text1.textContent = 'You will be redirected to the homepage in ';
                    text2.textContent = ' seconds ...';
                    text3.textContent = 'If you don\'t want to redirect, click ';
                    stopCountdown.textContent = 'here';
                }else if(localStorage.getItem('site-lang') === 'ja'){
                    text1.textContent = 'ホームページに ';
                    text2.textContent = ' 秒後にリダイレクトされます ...';
                    text3.textContent = 'リダイレクトしたくない場合は ';
                    stopCountdown.textContent = 'ここ';
                }else{
                    text1.textContent = '将会在 ';
                    text2.textContent = ' 秒后跳转到主页 ...';
                    text3.textContent = '如果不想跳转，点击';
                    stopCountdown.textContent = '这里';
                }
            }

            updateCountdownText();
            const countdownTimer = setInterval(() => {
                remainingSeconds -= 1;
                if(remainingSeconds <= 0){
                    clearInterval(countdownTimer);
                    window.location.href = "/";
                    return;
                }
                updateCountdownText();
            }, 1000);

            function stopRedirect(){
                clearInterval(countdownTimer);
                text1.style.display = 'none';
                countdown.style.display = 'none';
                text2.style.display = 'none';
                text3.style.display = 'none';
                stopCountdown.style.display = 'none';
                text4.style.display = 'block';
                text5.style.display = 'inline';
                goHome.style.display = 'inline';
                text6.style.display = 'inline';
                goLastPage.style.display = 'inline';
                goHome.link = '/';
                if(localStorage.getItem('site-lang') === 'en'){
                    text4.textContent = 'Redirection cancelled';
                    text5.textContent = 'Go back to ';
                    goHome.textContent = 'homepage';
                    text6.textContent = 'or';
                    goLastPage.textContent = 'last page';
                }else if(localStorage.getItem('site-lang') === 'ja'){
                    text4.textContent = 'リダイレクトはキャンセルされました';
                    text5.textContent = 'ホームページに戻る';
                    goHome.textContent = 'ホームページ';
                    text6.textContent = 'または';
                    goLastPage.textContent = '前のページ';
                }else{
                    text4.textContent = '已取消跳转';
                    text5.textContent = '返回';
                    goHome.textContent = '主页';
                    text6.textContent = '或';
                    goLastPage.textContent = '上一页';
                }
            }

            function restorePrefixText(element, text, timerHolder) {
                const target = String(text);
                let display = element.textContent.split('');
                if (display.length !== target.length) display = Array.from(target, () => ' ');
                let index = 0;

                if (timerHolder.timer) clearInterval(timerHolder.timer);
                timerHolder.timer = setInterval(() => {
                    if (index >= target.length) {
                        clearInterval(timerHolder.timer);
                        timerHolder.timer = null;
                        element.textContent = target;
                        return;
                    }
                    display[index] = target[index];
                    element.textContent = display.join('');
                    index += 1;
                }, 80);
            }

            function flashPrefixGarbledText(element, timerHolder) {
                const original = './';
                let garbleCount = 0;
                const maxGarbleSteps = 5;

                if (timerHolder.timer) {
                    clearInterval(timerHolder.timer);
                    timerHolder.timer = null;
                }

                timerHolder.timer = setInterval(() => {
                    element.textContent = createGarbled(original);
                    garbleCount += 1;
                    if (garbleCount >= maxGarbleSteps) {
                        clearInterval(timerHolder.timer);
                        timerHolder.timer = null;
                        restorePrefixText(element, original, timerHolder);
                    }
                }, 70);
            }

            if (menuButton) menuButton.addEventListener('mouseenter', () => flashPrefixGarbledText(titlePrefix, prefixAnimationTimer));
            if (sidebarButton) sidebarButton.addEventListener('mouseenter', () => flashPrefixGarbledText(sidebarPrefix, sidebarPrefixAnimationTimer));

            function setSidebarOpen(isOpen) {
                if (!sidebar) return;
                sidebar.classList.toggle('open', isOpen);
                sidebar.setAttribute('aria-hidden', String(!isOpen));
                if (menuButton) menuButton.setAttribute('aria-expanded', String(isOpen));
                if (sidebarButton) sidebarButton.setAttribute('aria-expanded', String(isOpen));
            }

            if (menuButton && sidebar) {
                menuButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const isOpen = !sidebar.classList.contains('open');
                    setSidebarOpen(isOpen);
                });

                if (sidebarButton) {
                    sidebarButton.addEventListener('click', (event) => {
                        event.stopPropagation();
                        setSidebarOpen(false);
                    });
                }

                document.addEventListener('click', (event) => {
                    if (!sidebar.classList.contains('open')) return;
                    if (sidebar.contains(event.target) || menuButton.contains(event.target) || (sidebarButton && sidebarButton.contains(event.target))) return;
                    setSidebarOpen(false);
                });
            }

            function randomChar(){return charSet[Math.floor(Math.random() * charSet.length)];}
            function createGarbled(text){return Array.from(text, ch => ch === ' ' ? ' ' : randomChar()).join('');}
            function animateText(element, text){
                const target = String(text);
                let display = createGarbled(target).split('');
                let index = 0;
                element.textContent = display.join('');

                const timer = setInterval(() => {
                    if(index >= target.length){
                        clearInterval(timer);
                        element.textContent = target;
                        return;
                    }
                    if(target[index] === ' '){
                        display[index] = ' ';
                        index += 1;
                        return;
                    }
                    display[index] = target[index];
                    for(let i = index + 1;i < target.length;i += 1)
                        if(target[i] !== ' ') display[i] = randomChar();
                    element.textContent = display.join('');
                    index += 1;
                },50);
            }

            window.addEventListener('load',() => {
                // 语言切换
                let lang = localStorage.getItem('site-lang') || 'zh';
                setLang(lang);

                titlePrefix.textContent = './';
                if(lang === 'zh' || path.startsWith('/zh/')) titleMain.textContent = createGarbled('诶呀，页面不见了');
                else if(lang === 'en' || path.startsWith('/en/')) titleMain.textContent = createGarbled('Oops, page not found');
                else if(lang === 'ja' || path.startsWith('/ja/')) titleMain.textContent = createGarbled('ページが見つかりません');
                else titleMain.textContent = createGarbled('404 Not Found');
                setTimeout(() => {
                    if(lang === 'zh' || path.startsWith('/zh/')) animateText(titleMain, '诶呀，页面不见了');
                    else if(lang === 'en' || path.startsWith('/en/')) animateText(titleMain, 'Oops, page not found');
                    else if(lang === 'ja' || path.startsWith('/ja/')) animateText(titleMain, 'ページが見つかりません');
                    else animateText(titleMain, '404 Not Found');
                },120);
            });
        </script>

    </body>
</html>
